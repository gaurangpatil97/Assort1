<style>
        body {
            background-color: #faf8ff;
            color: #131b2e;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
        }
        .input-focus-ring:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
        }
    </style>

<body class="font-body-md text-body-md min-h-screen flex flex-col justify-center items-center relative overflow-hidden">
<!-- Atmospheric Background Decoration -->
<div class="absolute inset-0 pointer-events-none -z-10">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container opacity-[0.03] rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-tertiary opacity-[0.03] rounded-full blur-[80px]"></div>
</div>
<!-- Main Content Shell -->
<main class="w-full max-w-[480px] px-md py-xl animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Logo & Branding -->
<div class="flex flex-col items-center mb-xl">
<div class="mb-md p-sm bg-primary-container text-on-primary-container rounded-lg shadow-sm">
<span class="material-symbols-outlined text-[32px]">assignment_turned_in</span>
</div>
<h2 class="font-display text-display text-primary tracking-tight">Assort1</h2>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mt-xs">Workflow Management</p>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0px_1px_3px_rgba(15,23,42,0.08)] overflow-hidden">
<div class="p-lg">
<!-- Welcome Header -->
<div class="mb-lg">
<h1 class="font-h1 text-h1 text-on-surface mb-xs">Complete your profile</h1>
<div class="flex items-center gap-sm bg-surface-container-low p-sm rounded-lg border border-outline-variant/30">
<div class="h-10 w-10 rounded-full bg-secondary-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined">business</span>
</div>
<div>
<p class="font-body-sm text-body-sm text-on-surface-variant leading-tight">Joining <span class="font-semibold text-on-surface">Acme Tech Corp</span> as</p>
<p class="font-label-md text-label-md text-primary">Senior Project Manager</p>
</div>
</div>
</div>
<!-- Registration Form -->
<form class="space-y-md" id="registrationForm">
<!-- Full Name -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="fullName">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-10 pr-md py-md bg-white border border-outline-variant rounded-lg font-body-md text-body-md input-focus-ring transition-all placeholder:text-outline" id="fullName" name="fullName" placeholder="Enter your legal name" required="" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-10 pr-12 py-md bg-white border border-outline-variant rounded-lg font-body-md text-body-md input-focus-ring transition-all placeholder:text-outline" id="password" name="password" placeholder="Min. 8 characters" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePassword('password')" type="button">
<span class="material-symbols-outlined text-[20px]" id="passwordIcon">visibility</span>
</button>
</div>
<div class="flex gap-xs mt-xs">
<div class="h-1 flex-1 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full w-0 transition-all duration-500" id="strength-bar"></div>
</div>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="confirmPassword">Confirm Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">verified_user</span>
<input class="w-full pl-10 pr-md py-md bg-white border border-outline-variant rounded-lg font-body-md text-body-md input-focus-ring transition-all placeholder:text-outline" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" required="" type="password"/>
</div>
</div>
<!-- Terms & Conditions -->
<div class="flex items-start gap-sm pt-xs">
<div class="flex items-center h-5">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary-container" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="text-body-sm text-on-surface-variant">
<label for="terms">I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>.</label>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container py-md px-lg rounded-lg font-label-md text-label-md hover:opacity-90 active:scale-[0.98] transition-all shadow-md flex items-center justify-center gap-sm mt-md" type="submit">
<span>Create account</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Section -->
<div class="bg-surface-container-low p-md border-t border-outline-variant flex justify-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Already have an account? <a class="text-primary font-semibold hover:underline" href="#">Log in</a>
</p>
</div>
</div>
<!-- Support Info -->
<div class="mt-lg flex justify-between items-center px-sm">
<button class="flex items-center gap-xs font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[16px]">help_outline</span>
<span>Need help?</span>
</button>
<p class="font-body-sm text-body-sm text-outline">© 2024 Assort1 India</p>
</div>
</main>
<script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(inputId + 'Icon');
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "visibility_off";
            } else {
                input.type = "password";
                icon.textContent = "visibility";
            }
        }

        // Mock password strength indicator
        const pwdInput = document.getElementById('password');
        const strengthBar = document.getElementById('strength-bar');

        pwdInput.addEventListener('input', (e) => {
            const val = e.target.value;
            let strength = 0;
            if (val.length > 5) strength += 33;
            if (val.match(/[A-Z]/)) strength += 33;
            if (val.match(/[0-9]/)) strength += 34;

            strengthBar.style.width = strength + '%';
            
            if (strength <= 33) {
                strengthBar.className = 'h-full bg-error transition-all duration-500';
            } else if (strength <= 66) {
                strengthBar.className = 'h-full bg-secondary-fixed-dim transition-all duration-500';
            } else {
                strengthBar.className = 'h-full bg-tertiary-container transition-all duration-500';
            }
        });

        // Form submission animation
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Setting up your workspace...';
            
            setTimeout(() => {
                btn.classList.replace('bg-primary-container', 'bg-tertiary-container');
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Welcome aboard!';
            }, 1500);
        });
    </script>
</body></html>
