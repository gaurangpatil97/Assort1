<!DOCTYPE html>

<style>
        body {
            background-color: #F8FAFC; /* User requested light grey background */
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
    </style>

<body class="flex items-center justify-center min-h-screen p-md">
<!-- Login Container -->
<main class="w-full max-w-[440px] transition-all duration-300">
<!-- Animated Background Element (Subtle atmosphere) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full bg-primary-fixed opacity-20 blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] rounded-full bg-tertiary-fixed opacity-20 blur-[100px]"></div>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm p-xl md:p-xl flex flex-col gap-xl">
<!-- Logo Section -->
<div class="flex flex-col items-center gap-xs">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-on-primary text-[24px]" style="font-variation-settings: 'FILL' 1;">dataset</span>
</div>
<h1 class="font-display text-display font-black text-primary tracking-tight">Assort1</h1>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">Workflow Management</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-lg" onsubmit="event.preventDefault();">
<!-- Header -->
<div class="text-center">
<h2 class="font-h2 text-h2 text-on-surface">Welcome back</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Sign in to manage your business operations</p>
</div>
<!-- Input Fields -->
<div class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">mail</span>
<input class="w-full pl-xl pr-md py-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all outline-none" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
<input class="w-full pl-xl pr-md py-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all outline-none" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full py-md bg-primary-container hover:bg-primary text-on-primary font-label-md text-label-md rounded-lg shadow-sm active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
<span>Sign in</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-md font-label-sm text-label-sm text-on-surface-variant">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- SSO Button (Secondary action style) -->
<button class="w-full py-md bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-low text-on-surface font-label-md text-label-md rounded-lg flex items-center justify-center gap-sm transition-colors" type="button">
<div class="w-5 h-5 flex items-center justify-center">
<svg class="w-full h-full" viewbox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path></svg>
</div>
<span>Sign in with Google</span>
</button>
</form>
<!-- Footer Links -->
<div class="flex justify-center gap-md font-body-sm text-body-sm text-on-surface-variant">
<span>New to Assort1?</span>
<a class="text-primary font-label-sm hover:underline" href="#">Contact Sales</a>
</div>
</div>
<!-- Decorative Footer -->
<div class="mt-xl flex justify-between items-center px-sm font-label-sm text-label-sm text-outline">
<p>© 2024 Assort1 India. All rights reserved.</p>
<div class="flex gap-md">
<a class="hover:text-on-surface transition-colors" href="#">Privacy</a>
<a class="hover:text-on-surface transition-colors" href="#">Terms</a>
</div>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            const button = form.querySelector('button[type="submit"]');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const originalContent = button.innerHTML;
                button.disabled = true;
                button.innerHTML = `
                    <svg class="animate-spin h-5 w-5 text-on-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Authenticating...</span>
                `;
                
                // Simulate delay
                setTimeout(() => {
                    button.innerHTML = originalContent;
                    button.disabled = false;
                    alert('This is a UI demo. Redirecting to dashboard...');
                }, 1500);
            });
        });
    </script>
</body></html>
